title: Azure Digital Natives Guide
description: The comprehensive Azure checklist and reference guide for digital native customers — covering identity, security, cost management, monitoring, IaC, AKS, AI, and more.
url: "https://azdnguide.com"
baseurl: ""
lang: en

remote_theme: just-the-docs/just-the-docs

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Header links
aux_links:
  "GitHub":
    - "https://github.com/ricmmartins/azure-digital-natives-checklist"
aux_links_new_tab: true

# Edit on GitHub link
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/ricmmartins/azure-digital-natives-checklist"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Last modified date in footer
last_edit_time_format: "%b %d, %Y"

# Use the Kramdown parser in GFM mode to enable task lists
markdown: kramdown
kramdown:
  input: GFM
  task_lists: true

plugins:
  - jekyll-remote-theme
